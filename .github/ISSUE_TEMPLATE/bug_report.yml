name: Bug report
description: Report a reproducible problem.
title: "bug: "
labels: ["bug", "needs-triage"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Include commands, repository layout, and expected output.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      description: Maintainer Compass version or commit.

