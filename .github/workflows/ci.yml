name: CI

on:
  push:
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "0 8 * * 1"

permissions:
  contents: read
  security-events: write

jobs:
  test:
    name: Test on Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m pip install -e .
      - run: python -m unittest discover -s tests
      - run: python -m maintainer_compass audit . --fail-under 100

  package:
    name: Build package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade build
      - run: python -m build
      - uses: actions/upload-artifact@v7
        with:
          name: python-package
          path: dist/*

  audit:
    name: Repository health audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install -e .
      - run: python -m maintainer_compass audit . --format markdown --output maintainer-compass-report.md
      - run: python -m maintainer_compass audit . --format sarif --output maintainer-compass.sarif
      - uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: maintainer-compass.sarif
        continue-on-error: true
      - uses: actions/upload-artifact@v7
        with:
          name: maintainer-compass-report
          path: |
            maintainer-compass-report.md
            maintainer-compass.sarif
